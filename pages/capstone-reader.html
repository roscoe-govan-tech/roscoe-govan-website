  <script>
    const pdfUrl =
      "../assets/documents/Capstone_Written_Report_RoscoeGovan.pdf";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const canvas = document.getElementById("pdf-canvas");
    const context = canvas.getContext("2d");
    const pageInfo = document.getElementById("page-info");
    const statusText = document.getElementById("reader-status");
    const prevButton = document.getElementById("prev-page");
    const nextButton = document.getElementById("next-page");

    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let isRendering = false;
    let pendingPage = null;

    const scale = 1.4;

    function renderPage(pageNumber) {
      isRendering = true;

      pdfDoc
        .getPage(pageNumber)
        .then(function (page) {
          const viewport = page.getViewport({ scale });

          canvas.width = viewport.width;
          canvas.height = viewport.height;

          return page.render({
            canvasContext: context,
            viewport: viewport
          }).promise;
        })
        .then(function () {
          isRendering = false;

          pageInfo.textContent =
            `Page ${currentPage} of ${totalPages}`;

          prevButton.disabled = currentPage <= 1;
          nextButton.disabled = currentPage >= totalPages;

          if (pendingPage !== null) {
            const nextPendingPage = pendingPage;
            pendingPage = null;
            renderPage(nextPendingPage);
          }
        })
        .catch(function (error) {
          console.error("PDF page-rendering error:", error);

          isRendering = false;
          statusText.textContent =
            "The selected PDF page could not be rendered.";
        });
    }

    function queueRenderPage(pageNumber) {
      if (isRendering) {
        pendingPage = pageNumber;
      } else {
        renderPage(pageNumber);
      }
    }

    function showPreviousPage() {
      if (currentPage <= 1) {
        return;
      }

      currentPage -= 1;
      queueRenderPage(currentPage);
    }

    function showNextPage() {
      if (currentPage >= totalPages) {
        return;
      }

      currentPage += 1;
      queueRenderPage(currentPage);
    }

    prevButton.addEventListener("click", showPreviousPage);
    nextButton.addEventListener("click", showNextPage);

    pdfjsLib
      .getDocument(pdfUrl)
      .promise
      .then(function (pdf) {
        pdfDoc = pdf;
        totalPages = pdf.numPages;

        statusText.textContent =
          "Use the arrows to navigate through the report.";

        renderPage(currentPage);
      })
      .catch(function (error) {
        console.error("PDF load error:", error);

        pageInfo.textContent = "Could not load PDF";
        statusText.textContent =
          "The PDF could not be loaded. Confirm that its filename and folder path exactly match the project structure.";
      });
  </script>
